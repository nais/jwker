name: Build and deploy
on:
  push:
    paths-ignore:
      - "*.md"
permissions:
  contents: read
env:
  NAME: jwker
  FEATURE_REPOSITORY: oci://europe-north1-docker.pkg.dev/nais-io/nais/feature
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # ratchet:actions/setup-go@v6
        with:
          go-version-file: "go.mod"
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # ratchet:jdx/mise-action@v4
      - run: mise run check
      - run: mise run test
  build_and_push:
    if: github.ref == 'refs/heads/master'
    outputs:
      version: ${{ steps.build-push-sign.outputs.version }}
    needs:
      - test
    permissions:
      packages: "write"
      id-token: "write"
    name: build and push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - uses: nais/platform-build-push-sign@a16d89d06262f12e3468a20b9cc70f5317290bab # ratchet:nais/platform-build-push-sign@main
        id: build-push-sign
        with:
          name: ${{ env.NAME }}
          google_service_account: gh-${{ env.NAME }}
          workload_identity_provider: ${{ secrets.NAIS_IO_WORKLOAD_IDENTITY_PROVIDER }}
          push_ghcr: true
          push: true
      - name: Update values.yaml
        run: |
          yq -i ".tag = \"${{ steps.build-push-sign.outputs.version }}\"" charts/values.yaml
      - uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # ratchet:azure/setup-helm@v5
        name: "Setup Helm"
        with:
          version: "v3.16.2"
      - name: Build Chart
        run: |-
          yq -i ".version = \"${{ steps.build-push-sign.outputs.version }}\"" charts/Chart.yaml
          helm package charts
      - name: Push Chart
        run: |-
          helm push tokenx-${{ env.NAME }}*.tgz ${{ env.FEATURE_REPOSITORY }}
  rollout:
    needs:
      - build_and_push
    runs-on: fasit-deploy
    permissions:
      id-token: write
    steps:
      - uses: nais/fasit-deploy@6e5772c21e82cb101537dd5e3ce78d70e2ae6402 # ratchet:nais/fasit-deploy@v3
        with:
          chart: ${{ env.FEATURE_REPOSITORY }}/tokenx-${{ env.NAME }}
          version: ${{ needs.build_and_push.outputs.version }}
          target: |
            {"kind":"tenant","tenant":"dev-nais"}
      - uses: nais/fasit-deploy@6e5772c21e82cb101537dd5e3ce78d70e2ae6402 # ratchet:nais/fasit-deploy@v3
        with:
          chart: ${{ env.FEATURE_REPOSITORY }}/tokenx-${{ env.NAME }}
          version: ${{ needs.build_and_push.outputs.version }}
          skip-ci: true
          target: |
            {"kind":"onprem","tenant":"nav"}
      - uses: nais/fasit-deploy@6e5772c21e82cb101537dd5e3ce78d70e2ae6402 # ratchet:nais/fasit-deploy@v3
        with:
          chart: ${{ env.FEATURE_REPOSITORY }}/tokenx-${{ env.NAME }}
          version: ${{ needs.build_and_push.outputs.version }}
          target: |
            {"kind":"tenant","tenant":"nav"}
