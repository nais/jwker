name: Build and deploy
on:
  push:
    paths-ignore:
      - "*.md"
      - "LICENSE.md"
permissions:
  contents: read
env:
  NAME: jwker
  FEATURE_REPOSITORY: oci://europe-north1-docker.pkg.dev/nais-io/nais/feature
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # ratchet:actions/setup-go@v6
        with:
          go-version-file: "go.mod"
      - name: Setup Test
        run: |
          make setup-envtest
      - name: Check for vulnerable dependencies and static code
        run: make check
      - name: Run tests
        run: make test
  build_and_push:
    if: github.ref == 'refs/heads/master'
    outputs:
      version: ${{ steps.build-push-sign.outputs.version }}
    needs:
      - test
    permissions:
      packages: "write"
      id-token: "write"
    name: build and push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - uses: nais/platform-build-push-sign@f276e60f3898b076a67bfc94b52ffbdb885224a7 # ratchet:nais/platform-build-push-sign@main
        id: build-push-sign
        with:
          name: ${{ env.NAME }}
          google_service_account: gh-${{ env.NAME }}
          workload_identity_provider: ${{ secrets.NAIS_IO_WORKLOAD_IDENTITY_PROVIDER }}
          push_ghcr: true
          push: true
      - name: Update values.yaml
        run: |
          yq -i ".tag = \"${{ steps.build-push-sign.outputs.version }}\"" charts/values.yaml
      - uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # ratchet:azure/setup-helm@v5.0.0
        name: "Setup Helm"
        with:
          version: "v3.16.2"
      - name: Build Chart
        run: |-
          yq -i ".version = \"${{ steps.build-push-sign.outputs.version }}\"" charts/Chart.yaml
          helm package charts
      - name: Push Chart
        run: |-
          helm push tokenx-${{ env.NAME }}*.tgz ${{ env.FEATURE_REPOSITORY }}
  rollout:
    needs:
      - build_and_push
    runs-on: fasit-deploy
    permissions:
      id-token: write
    steps:
      - uses: nais/fasit-deploy@8727ed1c7a5a465e837873e6016a9a692a6b874a # ratchet:nais/fasit-deploy@v2
        with:
          chart: ${{ env.FEATURE_REPOSITORY }}/tokenx-${{ env.NAME }}
          version: ${{ needs.build_and_push.outputs.version }}
